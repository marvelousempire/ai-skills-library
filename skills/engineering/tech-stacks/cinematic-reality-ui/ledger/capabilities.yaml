schema_version: "1.0"
stack_id: cinematic-reality-ui
bible_root: doctrine/docs/quality

capabilities:
  bible_token_audit:
    description: Audit UI/code against design tokens and hard-rules
    payload_id: bible_audit_report
    requires_files:
      - doctrine/docs/quality/bible/hard-rules.md
      - doctrine/docs/quality/bible/design-tokens.md
    surfaces: [web]

  aces_pipeline_review:
    description: Review or explain ACES tone-mapping per stack docs
    payload_id: bible_audit_report
    requires_files:
      - doctrine/docs/rendering/aces-tone-mapping.md
    surfaces: [web]

  screen_space_fluid_review:
    description: Review screen-space fluid rendering approach
    payload_id: webgpu_fluid_hero
    requires_files:
      - doctrine/docs/rendering/screen-space-fluid-rendering.md
      - doctrine/docs/quality/fluid-sim/README.md
    surfaces: [web]

  webgpu_fluid_hero:
    description: Implement or modify cinematic-fluid-hero reference app
    payload_id: webgpu_fluid_hero
    requires_files:
      - decanter/apps/cinematic-fluid-hero/package.json
      - doctrine/docs/quality/bible/design-tokens.md
    requires_tools: [webgpu, node, pnpm]
    surfaces: [web]

  milk_pour_prototype:
    description: Work on milk-pour WebGPU prototype
    payload_id: milk_pour_prototype
    requires_files:
      - decanter/apps/milk-pour/package.json
    requires_tools: [webgpu, node, pnpm]
    surfaces: [web]

  prd_scope_answer:
    description: Answer product scope questions from canonical PRD only
    payload_id: prd_answer
    requires_files:
      - doctrine/docs/product/canonical-prd.md
    surfaces: [product]

  arena_blueprint_answer:
    description: Explain native Cinematic Broadcast Arena blueprint (docs-only unless ios_build added to ledger)
    payload_id: arena_blueprint_doc
    requires_files:
      - doctrine/docs/arena/cinematic-broadcast-arena.md
    surfaces: [ios]

  decanter_pipeline:
    description: Run or explain decanter stages (parse, group, clean)
    payload_id: decanter_artifacts
    requires_files:
      - decanter/README.md
    surfaces: [docs]

decline_examples:
  - request: "Build Unreal Engine fluid simulation"
    reason: "Not on ledger; stack is WebGPU + screen-space fluid + RealityKit doctrine"
    alternatives: [screen_space_fluid_review, webgpu_fluid_hero]

  - request: "Add Tailwind to the hero app"
    reason: "tailwindcss is forbidden_patterns in ledger/dependencies.yaml"
    alternatives: [bible_token_audit, webgpu_fluid_hero]

  - request: "Ship TestFlight arena app"
    reason: "No ios_build payload registered; arena_blueprint_doc is docs-only"
    alternatives: [arena_blueprint_answer, webgpu_fluid_hero]
