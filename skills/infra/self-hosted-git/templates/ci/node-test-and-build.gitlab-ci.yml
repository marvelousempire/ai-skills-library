# Node / TypeScript: install → typecheck → test → bundle.
#
# Drop this at the root of a Node project as .gitlab-ci.yml. Requires:
#   - package.json with `typecheck` and `test` scripts (or adjust below)
#   - a runner with the `docker` tag (the self-hosted-git skill registers one)
#
# Produces:
#   - artifact at $CI_PROJECT_DIR/dist/ (downloadable from the pipeline page)
#   - cache of node_modules + ~/.npm for fast re-runs

image: node:24-slim

# Stage order determines execution order. Jobs in the same stage run in parallel.
stages:
  - test
  - build

# Cache npm and node_modules across pipelines so re-runs are fast.
cache:
  key:
    files:
      - package-lock.json
      - pnpm-lock.yaml
  paths:
    - node_modules/
    - .npm/

# Default before_script runs once per job. Picks pnpm if a lockfile is present,
# otherwise falls back to npm. Override if your project is different.
default:
  tags: [docker]
  before_script:
    - node --version
    - |
      if [ -f pnpm-lock.yaml ]; then
        corepack enable && corepack prepare pnpm@10 --activate
        pnpm install --frozen-lockfile
      elif [ -f package-lock.json ]; then
        npm ci --cache .npm --prefer-offline
      else
        npm install --cache .npm --prefer-offline
      fi

typecheck:
  stage: test
  script:
    - npm run typecheck

unit-tests:
  stage: test
  script:
    - npm test

bundle:
  stage: build
  needs: ["typecheck", "unit-tests"]   # only build if both tests pass
  script:
    - npm run build || echo "no build script — skipping (delete this job if intentional)"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    # Only bundle on main + tags. Skips bundle on feature-branch CI.
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
