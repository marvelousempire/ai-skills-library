# Build a Docker image and push it to the GitLab Container Registry.
#
# Auto-tags as $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA and (on default branch)
# also as :latest. Uses the registry that ships with your self-hosted GitLab CE.
#
# Requires:
#   - Dockerfile at the project root
#   - Container Registry enabled in your GitLab instance (it is by default in
#     the self-hosted-git skill's Compose template)
#   - A runner that can run privileged Docker — the runner registered by the
#     skill is `--docker-privileged` already

# Pull the official Docker-in-Docker (dind) image. The build job runs INSIDE
# this container; the host runner's Docker socket isn't used (cleaner isolation).
image: docker:27

services:
  - docker:27-dind

variables:
  # Tell the docker client where the dind sidecar is.
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  # Avoid logging the full image manifest on every push (cleaner logs).
  DOCKER_BUILDKIT: "1"

stages:
  - build

build-and-push:
  stage: build
  tags: [docker]
  before_script:
    # Log into the GitLab registry. CI_* variables are auto-injected.
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Build, tagging with both the short SHA AND latest (on default branch).
    - |
      docker build \
        --pull \
        --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" \
        $( [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && echo "--tag $CI_REGISTRY_IMAGE:latest" ) \
        .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    # Manual run on any other branch via the pipeline UI
    - when: manual
      allow_failure: true
