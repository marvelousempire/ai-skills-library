name: Validate skills

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md frontmatter
        run: python3 scripts/validate-skill-frontmatter.py
