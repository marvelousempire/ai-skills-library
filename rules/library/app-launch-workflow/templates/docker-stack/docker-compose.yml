# Canonical Docker stack — cloned from marvelousempire/claude-chat-reader.
# Every Learn Mappers app that needs state uses this exact shape.
#
# Services:
#   db     — Postgres + pgvector (handles SQL AND AI/RAG out of the box)
#   app    — the application (Next.js / Node / Python / anything)
#   caddy  — HTTPS reverse proxy (single entry point on :80 + :443)
#
# Optional add-ons (uncomment when needed): watcher, metabase, <name>-db.
#
# Rename `APP_NAME` everywhere below to your actual app id.

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Primary database — Postgres 16 with pgvector. Use one image for both
  # plain SQL and AI/RAG features so we never have to migrate later.
  # ──────────────────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    ports:
      # Expose to host for `pg_dump` / `psql` from the dev's Mac.
      # Comment out in prod if you don't need direct host access.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────────────────
  # The application itself. Built from ./Dockerfile (target: runner).
  # No host port — Caddy reverse-proxies on :443.
  # ──────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
      args:
        # Stamp commit/branch/time into the image so `/health` can show
        # "is the latest commit actually deployed?"
        GIT_SHA: ${GIT_SHA:-}
        GIT_BRANCH: ${GIT_BRANCH:-}
        BUILT_AT: ${BUILT_AT:-}
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}
      NODE_ENV: production
      PORT: 3000
      # Plumb through optional secrets from .env (empty if not set).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./db:/app/db:ro
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Caddy — HTTPS reverse proxy + the only service with host ports for HTTP.
  # In dev: internal TLS (run `caddy trust` once to install the CA).
  # In prod: auto-fetches Let's Encrypt certs — set CADDY_HOST in .env.
  # ──────────────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      CADDY_HOST: ${CADDY_HOST:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # ──────────────────────────────────────────────────────────────────────────
  # OPTIONAL — file-drop auto-ingest watcher. Uncomment if your app accepts
  # uploads via a host folder (`./data/incoming/*` → chokidar → ingestion).
  # ──────────────────────────────────────────────────────────────────────────
  # watcher:
  #   build:
  #     context: .
  #     target: watcher
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}
  #     WATCH_DIR: /watch
  #   volumes:
  #     - ./data:/app/data
  #     - ${WATCH_DIR_HOST:-./data/incoming}:/watch
  #   depends_on:
  #     db:
  #       condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # OPTIONAL — Metabase for no-code BI/SQL exploration over the data.
  # Uncomment when you want a non-dev member of the team to query the DB.
  # ──────────────────────────────────────────────────────────────────────────
  # metabase:
  #   image: metabase/metabase:v0.51.12
  #   restart: unless-stopped
  #   environment:
  #     MB_DB_TYPE: h2
  #     MB_DB_FILE: /metabase-data/metabase.db
  #   volumes:
  #     - metabase_data:/metabase-data
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  db_data:
  caddy_data:
  caddy_config:
  # metabase_data:
